<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Is In The Fridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e7f 0%, #a855a8 50%, #ec4899 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .ingredients-section, .recipes-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.5em;
            color: #a855a8;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #a855a8;
        }

        .ingredients-list {
            max-height: 600px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .ingredient-item:hover {
            background: #efefef;
            transform: translateX(5px);
        }

        .ingredient-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #a855a8;
        }

        .ingredient-item input[type="checkbox"]:checked + label {
            color: #a855a8;
            font-weight: bold;
        }

        .ingredient-item label {
            cursor: pointer;
            flex: 1;
            user-select: none;
        }

        .recipes-section {
            grid-column: 1 / -1;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-find-recipes {
            background: linear-gradient(135deg, #a855a8 0%, #ec4899 100%);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-find-recipes:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 168, 0.4);
        }

        .btn-find-recipes:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }

        .btn-clear:hover {
            background: #d0d0d0;
        }

        .recipes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .recipe-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-color: #a855a8;
        }

        .recipe-name {
            font-size: 1.3em;
            color: #a855a8;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .recipe-section {
            margin-bottom: 15px;
        }

        .recipe-section-title {
            font-weight: bold;
            color: #ec4899;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .recipe-section-content {
            padding-left: 15px;
            color: #555;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .match-percentage {
            display: inline-block;
            background: #a855a8;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .no-recipes {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 1.1em;
        }

        .message {
            padding: 15px;
            background: #f5e6f8;
            border-left: 4px solid #a855a8;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #a855a8;
            display: none;
        }

        .message.show {
            display: block;
        }

        .selected-count {
            display: inline-block;
            background: #a855a8;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .ingredients-list {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .recipes-list {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #a855a8;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ec4899;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧊 What Is In The Fridge</h1>
            <p class="subtitle">Select ingredients and find out what you can cook</p>
        </header>

        <div class="main-content">
            <div class="ingredients-section">
                <h2 class="section-title">📋 Ingredients</h2>
                <input 
                    type="text" 
                    class="search-box" 
                    id="ingredientSearch" 
                    placeholder="Search ingredients..."
                >
                <div id="selectedCount" class="selected-count" style="display: none;">
                    Selected: <span id="countValue">0</span> ingredients
                </div>
                <div class="ingredients-list" id="ingredientsList"></div>
            </div>

            <div style="grid-column: 1 / -1;">
                <div class="recipes-section">
                    <h2 class="section-title">👨‍🍳 Recipes</h2>
                    <div class="action-buttons">
                        <button class="btn-find-recipes" id="findRecipesBtn">
                            🔍 Find Recipes
                        </button>
                        <button class="btn-clear" id="clearBtn">
                            ✕ Clear All
                        </button>
                    </div>
                    <div id="message" class="message"></div>
                    <div class="recipes-list" id="recipesList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Comprehensive list of ingredients
        const ingredients = [
            // Meat and poultry
            'Chicken Breast', 'Ground Chicken', 'Chicken Thighs', 'Beef', 'Ground Beef',
            'Pork', 'Ground Pork', 'Sausage', 'Bacon', 'Ham',
            'Turkey', 'Duck', 'Venison', 'Lamb', 'Beans',

            // Fish and seafood
            'Salmon', 'Trout', 'Cod', 'Tuna', 'Sardine', 'Mackerel', 'Squid', 'Shrimp', 'Oyster', 'Mussels',

            // Eggs and dairy
            'Eggs', 'Sour Cream', 'Buttermilk', 'Fresh Cheese', 'Soft Cheese', 'Hard Cheese', 'Mozzarella', 'Parmesan',
            'Ricotta', 'Milk', 'Yogurt', 'Butter',

            // Vegetables
            'Onion', 'Garlic', 'Potato', 'Sweet Potato', 'Carrot', 'Celery', 'Tomato', 'Bell Pepper',
            'Cucumber', 'Zucchini', 'Eggplant', 'Cabbage', 'Broccoli', 'Cauliflower', 'Cabbage', 'Lettuce',
            'Spinach', 'Swiss Chard', 'Leek', 'Leek Greens', 'Ginger Root', 'Okra', 'Artichoke',

            // Fruits
            'Apple', 'Pear', 'Banana', 'Strawberry', 'Raspberry', 'Blueberry', 'Orange', 'Lemon',
            'Lime', 'Melon', 'Avocado', 'Coconut', 'Pineapple', 'Mango', 'Papaya', 'Pomegranate',
            'Cherry', 'Sour Cherry', 'Peach',

            // Pasta and grains
            'Spaghetti', 'Penne', 'Lasagna', 'Rice', 'Rice Flour', 'Wheat Flour',
            'Rye Flour', 'Corn Flour', 'Oatmeal', 'Couscous', 'Quinoa', 'Wheat',
            'Barley', 'Polenta', 'Bread', 'Toast Bread',

            // Sauces and spices
            'Olive Oil', 'Vegetable Oil', 'Sesame Oil', 'Butter', 'Garlic', 'Parsley',
            'Basil', 'Oregano', 'Thyme', 'Rosemary', 'Marjoram', 'Oregano', 'Paprika',
            'Black Pepper', 'Salt', 'Sugar', 'Vanilla', 'Cinnamon', 'Cardamom', 'Coriander', 'Cumin',
            'Mustard', 'Vinegar', 'Worcestershire Sauce', 'Soy Sauce', 'Chili Sauce',

            // Special ingredients
            'Honey', 'Poppy Seeds', 'Sunflower Seeds', 'Pumpkin Seeds', 'Hazelnuts', 'Almonds',
            'Peanuts', 'Walnuts', 'Cashews', 'Pine Nuts', 'Beans', 'Lentils', 'Chickpeas',
            'Virgin Coconut Oil', 'Malt',

            // Beverages and liquids
            'Water', 'Wine', 'Beer', 'Rum', 'Vodka', 'Brandy', 'Cognac',

            // Other
            'Chili', 'Coffee', 'Tea', 'Chocolate', 'Cocoa', 'Poppy', 'Balsamic Vinegar', 'Tahini',
            'Aromatic Herbs', 'Turmeric', 'Ginger', 'Nutmeg'
        ];

        // Recipes database
        const recipes = [
            {
                name: 'Spaghetti Bolognese',
                ingredients: ['Spaghetti', 'Ground Beef', 'Tomato', 'Onion', 'Garlic', 'Olive Oil', 'Oregano', 'Salt', 'Black Pepper'],
                instructions: '1. Heat oil and sauté onion and garlic\n2. Add ground beef and cook\n3. Add tomatoes and oregano\n4. Simmer for 20 minutes\n5. Cook pasta and serve',
                time: '30 min'
            },
            {
                name: 'Chicken Tikka Masala',
                ingredients: ['Chicken Breast', 'Yogurt', 'Spices', 'Onion', 'Garlic', 'Paprika', 'Cinnamon', 'Turmeric', 'Sour Cream', 'Tomato'],
                instructions: '1. Marinate chicken in yogurt and spices\n2. Fry chicken\n3. Sauté onion and garlic\n4. Add tomatoes and sour cream\n5. Add chicken back and cook',
                time: '45 min'
            },
            {
                name: 'Vegetarian Chili',
                ingredients: ['Beans', 'Tomato', 'Bell Pepper', 'Onion', 'Garlic', 'Chili', 'Cumula', 'Olive Oil'],
                instructions: '1. Sauté onion and garlic in oil\n2. Add bell pepper and tomatoes\n3. Add beans and chili\n4. Simmer for 30 minutes',
                time: '40 min'
            },
            {
                name: 'Omelet',
                ingredients: ['Eggs', 'Butter', 'Salt', 'Black Pepper', 'Parmesan'],
                instructions: '1. Crack eggs into a bowl\n2. Beat with salt and pepper\n3. Melt butter in pan\n4. Pour eggs and cook until set',
                time: '10 min'
            },
            {
                name: 'Rice with Chicken',
                ingredients: ['Rice', 'Chicken Breast', 'Bell Pepper', 'Onion', 'Garlic', 'Water', 'Olive Oil'],
                instructions: '1. Sauté onion and garlic\n2. Add chicken and cook\n3. Add rice and bell pepper\n4. Pour water and cook for 20 minutes',
                time: '35 min'
            },
            {
                name: 'Vegetable Soup',
                ingredients: ['Potato', 'Carrot', 'Celery', 'Onion', 'Tomato', 'Water', 'Salt', 'Black Pepper', 'Parsley'],
                instructions: '1. Chop vegetables\n2. Add water and bring to boil\n3. Cook until vegetables are soft\n4. Season and serve',
                time: '40 min'
            },
            {
                name: 'Pita with Chicken',
                ingredients: ['Chicken Breast', 'Onion', 'Bell Pepper', 'Soft Cheese', 'Tomato', 'Lettuce'],
                instructions: '1. Cook sliced chicken\n2. Toast pita bread\n3. Fill pita with chicken and vegetables\n4. Add cheese and lettuce',
                time: '25 min'
            },
            {
                name: 'Fish with Garlic Butter',
                ingredients: ['Cod', 'Butter', 'Garlic', 'Lemon', 'Parsley', 'Salt', 'Black Pepper'],
                instructions: '1. Prepare compound butter with garlic\n2. Pan-fry fish\n3. Place butter on top\n4. Serve with lemon',
                time: '20 min'
            },
            {
                name: 'Chocolate Cake',
                ingredients: ['Chocolate', 'Butter', 'Eggs', 'Wheat Flour', 'Sugar', 'Vanilla', 'Baking Powder'],
                instructions: '1. Melt chocolate and butter\n2. Beat eggs with sugar\n3. Mix ingredients\n4. Bake at 180°C for 30 minutes',
                time: '45 min'
            },
            {
                name: 'Mashed Potatoes',
                ingredients: ['Potato', 'Butter', 'Milk', 'Salt', 'Black Pepper', 'Parmesan'],
                instructions: '1. Boil potatoes until soft\n2. Drain and return to pot\n3. Add butter and milk\n4. Mash and season',
                time: '25 min'
            },
            {
                name: 'Caesar Salad',
                ingredients: ['Lettuce', 'Parmesan', 'Bread', 'Garlic', 'Mustard', 'Olive Oil', 'Lemon'],
                instructions: '1. Chop lettuce\n2. Make dressing from remaining ingredients\n3. Toss salad with dressing\n4. Serve with croutons',
                time: '15 min'
            },
            {
                name: 'Pasta Gratin',
                ingredients: ['Penne', 'Mozzarella', 'Parmesan', 'Tomato', 'Garlic Oil', 'Oregano'],
                instructions: '1. Cook pasta\n2. Mix with tomatoes and oregano\n3. Place in baking dish\n4. Top with cheese and bake for 20 minutes',
                time: '35 min'
            },
            {
                name: 'Fried Chicken Noodles',
                ingredients: ['Chicken Breast', 'Rice', 'Eggs', 'Onion', 'Garlic', 'Soy Sauce', 'Sesame Oil'],
                instructions: '1. Chop chicken and onion\n2. Fry everything in oil\n3. Add rice and eggs\n4. Season with soy sauce',
                time: '30 min'
            },
            {
                name: 'Baked Potato',
                ingredients: ['Potato', 'Butter', 'Sour Cream', 'Garlic', 'Parmesan', 'Salt', 'Black Pepper'],
                instructions: '1. Slice potatoes\n2. Layer in baking dish\n3. Pour sour cream and add butter\n4. Bake for 45 minutes at 180°C',
                time: '60 min'
            },
            {
                name: 'Lentil Soup',
                ingredients: ['Lentils', 'Onion', 'Carrot', 'Celery', 'Tomato', 'Water', 'Olive Oil', 'Salt'],
                instructions: '1. Sauté onion and carrot\n2. Add lentils and tomatoes\n3. Pour water and cook for 30 minutes\n4. Season with salt',
                time: '45 min'
            },
            {
                name: 'Grilled Salmon',
                ingredients: ['Salmon', 'Lemon', 'Parsley', 'Salt', 'Black Pepper', 'Olive Oil'],
                instructions: '1. Prepare grill\n2. Brush salmon with oil\n3. Grill for 4-5 minutes per side\n4. Serve with lemon',
                time: '20 min'
            },
            {
                name: 'Chicken with Honey',
                ingredients: ['Chicken Breast', 'Honey', 'Soy Sauce', 'Garlic', 'Ginger', 'Sesame Oil'],
                instructions: '1. Chop chicken\n2. Cook with garlic and ginger\n3. Add honey and soy sauce\n4. Cook for 15 minutes',
                time: '25 min'
            },
            {
                name: 'Tomato Sauce',
                ingredients: ['Tomato', 'Onion', 'Garlic', 'Olive Oil', 'Oregano', 'Salt', 'Black Pepper'],
                instructions: '1. Sauté onion and garlic\n2. Add tomatoes and oregano\n3. Cook for 20 minutes\n4. Use with pasta',
                time: '30 min'
            },
            {
                name: 'Fried Chicken',
                ingredients: ['Chicken Breast', 'Wheat Flour', 'Eggs', 'Salt', 'Black Pepper', 'Vegetable Oil'],
                instructions: '1. Prepare batter with eggs\n2. Coat chicken in flour and egg\n3. Fry in oil until golden\n4. Serve with lemon',
                time: '20 min'
            },
            {
                name: 'Zucchini Salad',
                ingredients: ['Zucchini', 'Tomato', 'Onion', 'Parsley', 'Olive Oil', 'Lemon', 'Salt'],
                instructions: '1. Chop zucchini and tomatoes\n2. Add onion and parsley\n3. Dress with oil and lemon\n4. Chill before serving',
                time: '15 min'
            }
        ];

        // Initialization
        const ingredientsList = document.getElementById('ingredientsList');
        const recipesList = document.getElementById('recipesList');
        const findRecipesBtn = document.getElementById('findRecipesBtn');
        const clearBtn = document.getElementById('clearBtn');
        const searchBox = document.getElementById('ingredientSearch');
        const messageDiv = document.getElementById('message');
        const selectedCountDiv = document.getElementById('selectedCount');
        const countValue = document.getElementById('countValue');

        let selectedIngredients = new Set();

        // Render ingredients
        function renderIngredients(filter = '') {
            ingredientsList.innerHTML = '';
            const filtered = ingredients.filter(ing => 
                ing.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(ingredient => {
                const div = document.createElement('div');
                div.className = 'ingredient-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = ingredient;
                checkbox.checked = selectedIngredients.has(ingredient);
                
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedIngredients.add(ingredient);
                    } else {
                        selectedIngredients.delete(ingredient);
                    }
                    updateSelectedCount();
                });

                const label = document.createElement('label');
                label.htmlFor = ingredient;
                label.textContent = ingredient;

                div.appendChild(checkbox);
                div.appendChild(label);
                ingredientsList.appendChild(div);
            });
        }

        function updateSelectedCount() {
            if (selectedIngredients.size > 0) {
                selectedCountDiv.style.display = 'inline-block';
                countValue.textContent = selectedIngredients.size;
            } else {
                selectedCountDiv.style.display = 'none';
            }
        }

        // Find recipes function
        function findRecipes() {
            if (selectedIngredients.size === 0) {
                showMessage('Select at least one ingredient!', 'error');
                recipesList.innerHTML = '<div class="no-recipes">Select ingredients to see recipes</div>';
                return;
            }

            const matchedRecipes = recipes.map(recipe => {
                const matchedIngredients = recipe.ingredients.filter(ing =>
                    selectedIngredients.has(ing)
                );
                const matchPercentage = Math.round((matchedIngredients.length / recipe.ingredients.length) * 100);
                
                return {
                    ...recipe,
                    matchedCount: matchedIngredients.length,
                    matchPercentage,
                    missingIngredients: recipe.ingredients.filter(ing => !selectedIngredients.has(ing))
                };
            }).filter(r => r.missingIngredients.length === 0)
              .sort((a, b) => b.matchPercentage - a.matchPercentage);

            if (matchedRecipes.length === 0) {
                const customRecipe = createCustomRecipe(Array.from(selectedIngredients));
                showMessage('No exact recipe found. Here is a custom recipe from your ingredients!', 'info');
                renderRecipes([customRecipe], true);
                return;
            }

            showMessage(`Found ${matchedRecipes.length} recipes you can cook with your ingredients! 🎉`, 'success');
            renderRecipes(matchedRecipes);
        }

        function createCustomRecipe(ingredients) {
            const title = ingredients.length === 1
                ? `Custom recipe with ${ingredients[0]}`
                : `Custom recipe with ${ingredients.slice(0, 3).join(', ')}${ingredients.length > 3 ? ' and more' : ''}`;

            const hasProtein = ingredients.some(ing => ['Chicken Breast', 'Ground Chicken', 'Chicken Thighs', 'Beef', 'Ground Beef', 'Pork', 'Ground Pork', 'Sausage', 'Bacon', 'Ham', 'Turkey', 'Duck', 'Venison', 'Lamb', 'Salmon', 'Trout', 'Cod', 'Tuna'].includes(ing));
            const hasGrain = ingredients.some(ing => ['Spaghetti', 'Penne', 'Lasagna', 'Rice', 'Rice Flour', 'Quinoa', 'Couscous', 'Bread', 'Toast Bread', 'Polenta', 'Barley', 'Oatmeal'].includes(ing));
            const hasVegetables = ingredients.some(ing => ['Onion', 'Garlic', 'Potato', 'Sweet Potato', 'Carrot', 'Celery', 'Tomato', 'Bell Pepper', 'Cucumber', 'Zucchini', 'Eggplant', 'Cabbage', 'Broccoli', 'Cauliflower', 'Lettuce', 'Spinach', 'Swiss Chard', 'Leek', 'Okra', 'Artichoke', 'Parsley', 'Basil'].includes(ing));

            const steps = [
                '1. Prepare and wash all selected ingredients.',
                hasProtein ? '2. Cook the protein first until fully done.' : '2. Prepare the main ingredients as needed.',
                hasGrain ? '3. Cook the grains or pasta until tender.' : '3. Combine the ingredients in a pan or bowl.',
                '4. Season with salt, pepper, and any spices you like.',
                '5. Serve warm and enjoy.'
            ];

            return {
                name: title,
                ingredients,
                instructions: steps.join('\n'),
                time: '30 min',
                matchedCount: ingredients.length,
                matchPercentage: 100,
                missingIngredients: []
            };
        }

        function renderRecipes(recipes, isCustom = false) {
            recipesList.innerHTML = '';
            
            recipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                
                const html = `
                    <div class="recipe-name">${recipe.name}</div>
                    <div class="recipe-section">
                        <div class="recipe-section-title">⏱️ Preparation Time:</div>
                        <div class="recipe-section-content">${recipe.time}</div>
                    </div>
                    <div class="recipe-section">
                        <div class="recipe-section-title">✅ You Have:</div>
                        <div class="recipe-section-content">${recipe.matchedCount}/${recipe.ingredients.length} ingredients</div>
                    </div>
                    ${recipe.missingIngredients.length > 0 ? `
                        <div class="recipe-section">
                            <div class="recipe-section-title">❌ Missing:</div>
                            <div class="recipe-section-content">${recipe.missingIngredients.join(', ')}</div>
                        </div>
                    ` : '<div class="recipe-section"><div class="recipe-section-content">🎉 You have all ingredients!</div></div>'}
                    <div class="recipe-section">
                        <div class="recipe-section-title">📝 Instructions:</div>
                        <div class="recipe-section-content">${recipe.instructions.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="match-percentage">Match: ${recipe.matchPercentage}%</div>
                `;
                
                card.innerHTML = html;
                recipesList.appendChild(card);
            });
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message show';
            messageDiv.style.borderLeftColor = type === 'error' ? '#ff6b6b' : type === 'success' ? '#51cf66' : '#a855a8';
            messageDiv.style.backgroundColor = type === 'error' ? '#ffe6e6' : type === 'success' ? '#e6ffe6' : '#f5e6f8';
            messageDiv.style.color = type === 'error' ? '#ff6b6b' : type === 'success' ? '#51cf66' : '#a855a8';
        }

        // Event listeners
        findRecipesBtn.addEventListener('click', findRecipes);
        clearBtn.addEventListener('click', () => {
            selectedIngredients.clear();
            renderIngredients();
            updateSelectedCount();
            recipesList.innerHTML = '';
            messageDiv.classList.remove('show');
        });

        searchBox.addEventListener('input', (e) => {
            renderIngredients(e.target.value);
        });

        // Initial render
        renderIngredients();
        updateSelectedCount();
    </script>
</body>
</html>
